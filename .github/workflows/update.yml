name: Update Namnsdag Image

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"   # 01:00 UTC = 03:00 svensk tid

jobs:
  update-image:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Swedish date
        run: |
          echo "RUN_DATE=$(TZ=Europe/Stockholm date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pillow

      - name: Generate image
        run: python3 generate.py
        env:
          RUN_DATE: ${{ env.RUN_DATE }}

      - name: Update index2.html
        run: |
          VERSION=${RUN_DATE//-/}
          cat <<EOF > index2.html
          <!DOCTYPE html>
          <html>
          <head>
          <meta charset="UTF-8">
          <style>
            html, body {
              margin: 0;
              padding: 0;
              background: #4169E1;
              height: 100%;
              overflow: hidden;
            }
            img {
              width: 100%;
              height: 100%;
              object-fit: contain;
              display: block;
            }
          </style>
          </head>
          <body>
            <img src="namnsdag-2026_v${VERSION}.png">
          </body>
          </html>
          EOF

      - name: Commit & push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add namnsdag-2026_v*.png index2.html
          git commit -m "Daily update ${RUN_DATE}" || echo "No changes"
          git push
