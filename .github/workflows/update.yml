name: Update Namnsdag Image

on:
  schedule:
    - cron: "0 0 * * *"  # varje natt kl 00:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # ✅ GER ACTIONS RÄTT ATT PUSH'A

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4   # ✅ NY VERSION

    - name: Setup Python
      uses: actions/setup-python@v5   # ✅ NY VERSION
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install pillow

    - name: Generate image
      run: |
        python generate.py

    - name: Commit updated image
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add namnsdag-2026.png
        git commit -m "Automated daily update" || echo "No changes"
        git push
