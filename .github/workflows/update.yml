name: Update Namnsdag Image

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python requirements
        run: |
          python3 -m pip install --upgrade pip
          pip install pillow pytz

      - name: Run generator
        run: python3 generate.py

      - name: Update index2.html with latest PNG
        run: |
          VERSION=$(date +"%Y%m%d")
          sed -i "s/namnsdag-2026.*/namnsdag-2026_v${VERSION}.png\" alt=\"namnsdag\">/" index2.html

      - name: Commit updated files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add namnsdag-2026_v*.png
          git add index2.html
          git commit -m "Daily auto-update" || echo "No changes"

      - name: Push changes
        uses: ad-m/github-push-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
