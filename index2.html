<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #4169E1;
    height: 100%;
    overflow: hidden;
  }
  img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }
</style>
</head>
<body>

<script>
(async () => {
  const api = "https://api.github.com/repos/Add3in/namnsdag-2026/contents";
  const base = "https://add3in.github.io/namnsdag-2026/";

  const res = await fetch(api);
  const files = await res.json();

  const pngs = files
    .filter(f => f.name.startsWith("namnsdag-2026_v") && f.name.endsWith(".png"))
    .map(f => f.name)
    .sort()
    .reverse();

  const latest = pngs[0];

  document.body.innerHTML = `<img src="${base}${latest}" altpt>

</body>
</html>
